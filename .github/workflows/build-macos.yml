name: Build macOS app

# Chạy thủ công trong tab Actions (Run workflow), hoặc khi đẩy tag v*.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build ${{ matrix.arch }} (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false            # 1 kiến trúc lỗi/chờ lâu KHÔNG huỷ cái kia
      matrix:
        include:
          - runner: macos-14      # Apple Silicon (M1/M2/M3…) -> app arm64, runner sẵn, cấp nhanh
            arch: arm64
          - runner: macos-13      # Intel x86_64 -> app chạy Mac Intel (runner có thể chờ lâu hơn)
            arch: intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build .app (ffmpeg + Chromium nhúng sẵn, đúng kiến trúc runner)
        run: bash build_mac.sh

      - name: Smoke test — app THẬT khởi động được (bắt lỗi thiếu cryptography)
        run: |
          BIN=dist/TNT_VideoSubtitleRemover.app/Contents/MacOS/TNT_VideoSubtitleRemover
          export QT_QPA_PLATFORM=offscreen
          rm -f dist/machine_id.txt
          # macOS KHÔNG có lệnh 'timeout' -> chạy nền, đợi machine_id.txt xuất hiện
          # (app ghi file này TRƯỚC khi hiện dialog), rồi tự kill. Có file = app chạy
          # được = cryptography/OpenSSL đã đóng gói đúng.
          "$BIN" > smoke.log 2>&1 &
          PID=$!
          for i in $(seq 1 90); do
            [ -f dist/machine_id.txt ] && break
            kill -0 "$PID" 2>/dev/null || break     # app đã tự thoát
            sleep 1
          done
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true
          echo "----- app output -----"; cat smoke.log || true; echo "----------------------"
          if grep -qi "No module named 'cryptography'" smoke.log; then
            echo "❌ VẪN thiếu cryptography trong bundle."; exit 1
          fi
          if [ ! -f dist/machine_id.txt ]; then
            echo "❌ App KHÔNG khởi động được tới bước license — xem app output ở trên."; exit 1
          fi
          echo "✅ App khởi động OK trên macOS (cryptography đã gói đúng). Mã máy runner:"
          cat dist/machine_id.txt
          rm -f dist/machine_id.txt

      - name: Tải kết quả lên (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: TNT_VideoSubtitleRemover-mac-${{ matrix.arch }}
          path: dist/TNT_VideoSubtitleRemover-mac.zip
          if-no-files-found: error
