name: Build macOS app

# Chạy thủ công trong tab Actions (Run workflow), hoặc khi đẩy tag v*.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  # Job CHẨN ĐOÁN: Linux chạy tức thì với mọi tài khoản. Nếu job này XONG nhanh mà
  # các job macOS bên dưới vẫn Queued -> vấn đề là runner macOS bị chặn ở tài khoản
  # (thường do chưa thêm phương thức thanh toán), không phải lỗi workflow.
  probe-linux:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Linux runner OK"

  build:
    name: Build ${{ matrix.arch }} (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false            # 1 kiến trúc lỗi/chờ lâu KHÔNG huỷ cái kia
      matrix:
        include:
          - runner: macos-14      # Apple Silicon (M1/M2/M3…) -> app arm64, runner sẵn, cấp nhanh
            arch: arm64
          - runner: macos-13      # Intel x86_64 -> app chạy Mac Intel (runner có thể chờ lâu hơn)
            arch: intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build .app (ffmpeg + Chromium nhúng sẵn, đúng kiến trúc runner)
        run: bash build_mac.sh

      - name: Tải kết quả lên (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: TNT_VideoSubtitleRemover-mac-${{ matrix.arch }}
          path: dist/TNT_VideoSubtitleRemover-mac.zip
          if-no-files-found: error
